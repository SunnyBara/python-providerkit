name: Django providerkit release

on:
  push:
    tags:
      - "django-providerkit-v*"
  workflow_dispatch:

jobs:
  publish-testpypi:
    if: startsWith(github.ref, 'refs/tags/django-providerkit-v') && contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: django-providerkit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Django==5.2.*"
          python -m pip install "clicommands @ git+https://github.com/SunnyBara/python-clicommands.git@3d8b78ba62d1ff3fff0803060a467d8f44cbc86a"
          python -m pip install -e ../python-providerkit
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: django-providerkit/dist/

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/django-providerkit-v') && !contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: django-providerkit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Django==5.2.*"
          python -m pip install "clicommands @ git+https://github.com/SunnyBara/python-clicommands.git@3d8b78ba62d1ff3fff0803060a467d8f44cbc86a"
          python -m pip install -e ../python-providerkit
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: django-providerkit/dist/
